[project]
name = "llama-cpp_vllm"
description = "Run LLM/VLM models natively in ComfyUI based on llama.cpp"
version = "1.2.8"
license = {file = "LICENSE"}
classifiers = [
     "Operating System :: Microsoft :: Windows",
     "Operating System :: POSIX :: Linux",
     "Operating System :: MacOS",
     "Environment :: GPU :: NVIDIA CUDA",
     "Environment :: GPU :: AMD ROCm",
     "Environment :: GPU :: Intel Arc",
     "Environment :: GPU :: Apple Metal",
]

dependencies = ["diskcache", "scipy", "numpy", "pillow", "gguf"]

[project.urls]
Repository = "https://github.com/hcwhan/ComfyUI-llama-cpp-vulkan"
Documentation = "https://github.com/hcwhan/ComfyUI-llama-cpp-vulkan/blob/main/README.md"
"Bug Tracker" = "https://github.com/hcwhan/ComfyUI-llama-cpp-vulkan/issues"

[tool.comfy]
PublisherId = "lhy666"
DisplayName = "ComfyUI-llama-cpp-vulkan"
Icon = ""
includes = []
# "requires-comfyui" = ">=1.0.0"  # ComfyUI version compatibility
