name: Build llama-cpp-python Vulkan Wheels (ABI3 Universal)

on:
  workflow_dispatch:
    inputs:
      jamepeng_ref:
        description: "Branch/tag/commit of JamePeng/llama-cpp-python to build"
        required: true
        default: "main"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.jamepeng_ref }}
  cancel-in-progress: true

env:
  VULKAN_SDK_VERSION: "1.4.341.0"
  MICROMAMBA_VERSION: "2.8.1-0"
  # ABI3 minimum Python version - wheel supports CPython 3.10+
  # llama-cpp-python uses ctypes (no C extension), so the wheel binary
  # content is truly Python-version-independent.
  ABI3_MIN_CPYTHON: "cp310"

jobs:
  # ----------------------------------------------------------------
  #  Resolve ref to commit SHA (pin both platform builds)
  # ----------------------------------------------------------------
  # 前置把 ref 统一解析为 commit SHA: 若两个 build job 各自 checkout 分支名,
  # 构建窗口内上游有新 push 时两平台会取到不同 commit (混源), release 的版本
  # 一致性校验拦不住版本号未变的情况; 解析后统一 checkout 同一 SHA, release
  # body 也以此追溯实际构建的源码 commit.
  resolve_ref:
    name: Resolve ref to commit SHA
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Resolve ref
        id: resolve
        env:
          REF: ${{ inputs.jamepeng_ref }}
        run: |
          REPO_URL="https://github.com/JamePeng/llama-cpp-python.git"
          # 分支优先于同名 tag; tag 优先取 ^{} 剥离行 (注解 tag 对象指向的
          # commit), 轻量 tag 无剥离行时取 tag 行本身
          SHA=$(git ls-remote "$REPO_URL" "refs/heads/$REF" | cut -f1)
          if [ -z "$SHA" ]; then
            TAG_LINES=$(git ls-remote "$REPO_URL" "refs/tags/$REF" "refs/tags/$REF^{}")
            SHA=$(printf '%s\n' "$TAG_LINES" | awk '/\^\{\}$/ { print $1; exit }')
            if [ -z "$SHA" ]; then
              SHA=$(printf '%s\n' "$TAG_LINES" | awk 'NR == 1 { print $1 }')
            fi
          fi
          # 分支/tag 均未命中: ref 应当本身就是完整 commit SHA, 原样透传
          # (短 SHA 不放行: actions/checkout 按 SHA fetch 只认 40 位全长)
          if [ -z "$SHA" ]; then
            if printf '%s' "$REF" | grep -qiE '^[0-9a-f]{40}$'; then
              SHA="$REF"
            else
              echo "Cannot resolve '$REF' to a commit in JamePeng/llama-cpp-python"
              exit 1
            fi
          fi
          echo "Resolved '$REF' -> $SHA"
          echo "commit_sha=$SHA" >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------
  #  Windows build (single universal wheel)
  # ----------------------------------------------------------------
  build_windows:
    name: Build Vulkan wheel (Windows abi3)
    needs: resolve_ref
    runs-on: windows-2022
    timeout-minutes: 180

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout JamePeng/llama-cpp-python
        uses: actions/checkout@v6
        with:
          repository: JamePeng/llama-cpp-python
          ref: ${{ needs.resolve_ref.outputs.commit_sha }}
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: true
          enable-cache: true

      # Cached install; only headers, libs and glslc are needed for the build.
      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: ${{ env.VULKAN_SDK_VERSION }}
          install_runtime: false
          cache: true
          stripdown: true

      - name: Verify Vulkan SDK
        run: |
          "$env:VULKAN_SDK\Bin" >> $env:GITHUB_PATH
          & "$env:VULKAN_SDK\Bin\glslc.exe" --version

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install ninja
        run: uv pip install ninja

      # Patch the version source so wheel filename AND metadata carry +vulkan
      # (renaming the wheel afterwards would leave METADATA inconsistent).
      - name: Embed +vulkan local version
        run: |
          $initFile = 'llama_cpp/__init__.py'
          (Get-Content $initFile) -replace '^__version__ = "([^"]+)"$', '__version__ = "$1+vulkan"' | Set-Content $initFile
          Select-String -Path $initFile -Pattern '__version__'

      - name: Build Vulkan wheel (abi3)
        env:
          SKBUILD_WHEEL_PY_API: ${{ env.ABI3_MIN_CPYTHON }}
          SCCACHE_GHA_ENABLED: "true"
        run: |
          $env:CMAKE_GENERATOR = 'Ninja'
          $env:CMAKE_ARGS = @(
            '-DGGML_VULKAN=ON'
            '-DGGML_NATIVE=OFF'
            '-DGGML_BACKEND_DL=ON'
            '-DGGML_CPU_ALL_VARIANTS=ON'
            '-DCMAKE_C_COMPILER_LAUNCHER=sccache'
            '-DCMAKE_CXX_COMPILER_LAUNCHER=sccache'
          ) -join ' '

          Write-Output "CMAKE_ARGS=$($env:CMAKE_ARGS)"
          Write-Output "SKBUILD_WHEEL_PY_API=$($env:SKBUILD_WHEEL_PY_API)"
          uv build --wheel

          if (!(Test-Path '.\dist\*.whl')) {
            Write-Error "No wheel found in dist/"
            exit 1
          }

          $wheelFile = Get-Item '.\dist\*.whl' | Select-Object -First 1
          if ($wheelFile.Name -notmatch '\+vulkan') {
            Write-Error "Wheel filename missing +vulkan local version: $($wheelFile.Name)"
            exit 1
          }
          # Linux 侧由 cibuildwheel/auditwheel 天然校验平台 tag, Windows 侧手动核对
          if ($wheelFile.Name -notmatch "$($env:ABI3_MIN_CPYTHON)-abi3-win_amd64") {
            Write-Error "Wheel filename missing abi3 platform tag ($($env:ABI3_MIN_CPYTHON)-abi3-win_amd64): $($wheelFile.Name)"
            exit 1
          }
          Write-Output "Built wheel: $($wheelFile.Name)"

          sccache --show-stats

      # Smoke test: install the built wheel and import it, catching packaging
      # breakage (missing DLLs, bad RECORD) before release. Import must run
      # outside the repo root: the source tree's llama_cpp/ package (without
      # built native libs) would shadow the installed wheel on sys.path.
      # Plain import only loads llama/ggml base DLLs; the Vulkan backend DLL
      # is loaded lazily (GGML_BACKEND_DL), so no Vulkan runtime is needed.
      - name: Smoke test wheel
        run: |
          $wheelFile = Get-Item '.\dist\*.whl' | Select-Object -First 1
          uv pip install $wheelFile.FullName
          Set-Location $env:RUNNER_TEMP
          python -c "import llama_cpp; print('llama_cpp', llama_cpp.__version__)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-vulkan-abi3-windows
          path: ./dist/*.whl
          compression-level: 0

  # ----------------------------------------------------------------
  #  Linux build (single universal wheel via cibuildwheel)
  # ----------------------------------------------------------------
  build_linux:
    name: Build Vulkan wheel (Linux abi3)
    needs: resolve_ref
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout JamePeng/llama-cpp-python
        uses: actions/checkout@v6
        with:
          repository: JamePeng/llama-cpp-python
          ref: ${{ needs.resolve_ref.outputs.commit_sha }}
          submodules: recursive

      # See the Windows job for why the version source is patched.
      - name: Embed +vulkan local version
        run: |
          sed -i -E 's/^__version__ = "([^"]+)"$/__version__ = "\1+vulkan"/' llama_cpp/__init__.py
          grep '__version__' llama_cpp/__init__.py

      - name: Build wheel with cibuildwheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          # Build only one Python version; abi3 wheel covers all 3.10+
          CIBW_BUILD: "cp312-manylinux_x86_64"
          CIBW_ARCHS: "auto64"
          # manylinux_2_28: GGML_CPU_ALL_VARIANTS needs GCC >= 11 (AMX/AVX-VNNI flags)
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          # Vulkan headers/loader/glslc come from conda-forge instead of the
          # full LunarG SDK tarball (~700MB download saved).
          CIBW_BEFORE_ALL_LINUX: >
            curl -fL "https://github.com/mamba-org/micromamba-releases/releases/download/${{ env.MICROMAMBA_VERSION }}/micromamba-linux-64"
            -o /usr/local/bin/micromamba &&
            chmod +x /usr/local/bin/micromamba &&
            micromamba create -y -p /opt/vulkan
            -c conda-forge shaderc libvulkan-loader spirv-headers
            libvulkan-headers=${{ env.VULKAN_SDK_VERSION }} &&
            /opt/vulkan/bin/glslc --version
          # CMAKE_PREFIX_PATH is required: ggml-vulkan does
          # find_package(SPIRV-Headers), which only exists in the conda env.
          CIBW_ENVIRONMENT_LINUX: >
            SKBUILD_WHEEL_PY_API=${{ env.ABI3_MIN_CPYTHON }}
            CMAKE_ARGS="-DGGML_NATIVE=OFF
            -DGGML_METAL=OFF
            -DGGML_OPENMP=OFF
            -DGGML_VULKAN=ON
            -DGGML_BACKEND_DL=ON
            -DGGML_CPU_ALL_VARIANTS=ON
            -DCMAKE_PREFIX_PATH=/opt/vulkan
            -DVulkan_INCLUDE_DIR=/opt/vulkan/include
            -DVulkan_LIBRARY=/opt/vulkan/lib/libvulkan.so
            -DVulkan_GLSLC_EXECUTABLE=/opt/vulkan/bin/glslc"
          # Target manylinux_2_31, not 2_28: gcc-toolset-14 on AlmaLinux 8 links
          # against the system libstdc++ baseline (GCC 8.5), emitting
          # GLIBCXX_3.4.25 references that exceed auditwheel's 2_28 allowlist;
          # 2_31 is the lowest policy that admits them (auditwheel show verdict).
          # Repair's LD_LIBRARY_PATH stays limited to the wheel's own lib dir
          # (the excluded libvulkan.so.1 is skipped before resolution); the
          # diagnostic show call gets the conda path since it lacks --exclude.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            (LD_LIBRARY_PATH=/project/llama_cpp/lib:/opt/vulkan/lib auditwheel show {wheel} || true) &&
            LD_LIBRARY_PATH=/project/llama_cpp/lib
            auditwheel repair --plat manylinux_2_31_x86_64
            --exclude libvulkan.so.1 -w {dest_dir} {wheel}
        with:
          package-dir: .
          output-dir: wheelhouse

      - name: Verify wheels
        run: |
          ls -la wheelhouse/
          ls wheelhouse/*+vulkan*.whl

      # Smoke test: install the repaired wheel and import it, catching
      # packaging breakage (auditwheel over-stripping, bad RECORD) before
      # release. CIBW_TEST_COMMAND cannot do this: the manylinux_2_31 wheel
      # is not installable inside the manylinux_2_28 (glibc 2.28) build
      # container, so test on the host instead (ubuntu-22.04, glibc 2.35).
      # Import must run outside the repo root: the source tree's llama_cpp/
      # package (without built native libs) would shadow the installed wheel.
      # Plain import only loads llama/ggml base libs; the Vulkan backend is
      # loaded lazily (GGML_BACKEND_DL), so no Vulkan runtime is needed.
      - name: Smoke test wheel
        run: |
          python3 -m pip install wheelhouse/*.whl
          cd "$RUNNER_TEMP"
          python3 -c "import llama_cpp; print('llama_cpp', llama_cpp.__version__)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-vulkan-abi3-linux
          path: ./wheelhouse/*.whl
          compression-level: 0

  # ----------------------------------------------------------------
  #  Release (collects all wheels)
  # ----------------------------------------------------------------
  release:
    name: Create Release
    needs: [resolve_ref, build_windows, build_linux]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Prepare release
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

          # 从全部 wheel 文件名提取版本并要求一致, 避免 "取第一个" 的脆弱写法;
          # [0-9.]+ 兼容未来的 4 段版本号, 提取为空 (文件名形态变化) 时显式报错
          # 而非放行出 "v-vulkan-abi3-<日期>" 这类缺版本号的 tag
          VERSIONS=$(ls dist/*.whl | grep -oP '(?<=python-)[0-9.]+(?=\+vulkan)' | sort -u)
          if [ -z "$VERSIONS" ] || [ "$(echo "$VERSIONS" | wc -l)" -ne 1 ]; then
            echo "Cannot extract a single consistent version from wheel filenames:"
            ls dist/*.whl
            exit 1
          fi
          echo "TAG_VERSION=$VERSIONS" >> $GITHUB_ENV

          echo "=== Wheels to release ==="
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          tag_name: v${{ env.TAG_VERSION }}-vulkan-abi3-${{ env.BUILD_DATE }}
          name: "llama-cpp-python v${{ env.TAG_VERSION }} Vulkan (ABI3)"
          body: |
            Pre-built `llama-cpp-python` wheels with **Vulkan** GPU backend.
            **ABI3 universal build** - one wheel per platform, compatible with CPython 3.10+.

            Source: [JamePeng/llama-cpp-python](https://github.com/JamePeng/llama-cpp-python) @ `${{ inputs.jamepeng_ref }}`
            Commit: [`${{ needs.resolve_ref.outputs.commit_sha }}`](https://github.com/JamePeng/llama-cpp-python/commit/${{ needs.resolve_ref.outputs.commit_sha }})

            ## Platforms

            | Platform | Wheel tag | Compatible Python |
            |----------|-----------|-------------------|
            | Windows x86_64 | `cp310-abi3-win_amd64` | CPython 3.10+ |
            | Linux x86_64 (glibc >= 2.31) | `cp310-abi3-manylinux_2_31_x86_64` | CPython 3.10+ |

            ## Install

            ```bash
            pip install <wheel-filename>.whl
            ```

            ## Build flags

            **Windows & Linux:**
            - `GGML_VULKAN=ON` / `GGML_NATIVE=OFF`
            - `GGML_BACKEND_DL=ON` / `GGML_CPU_ALL_VARIANTS=ON`

            **Linux (manylinux_2_31) additionally:**
            - `GGML_METAL=OFF` / `GGML_OPENMP=OFF`

            ## Note

            This build uses the CPython Stable ABI (abi3) tag. Since `llama-cpp-python`
            uses ctypes for its Python bindings (no compiled C extension), the native
            libraries are truly Python-version-independent.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
